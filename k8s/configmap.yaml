
apiVersion: v1
kind: ConfigMap
metadata:
  name: stans-app-config
  labels:
    app: stans-app
data:
  # Application configuration
  APP_ENV: "production"
  APP_NAME: "STANS Navigation System"
  APP_VERSION: "1.0.0"
  
  # API configuration
  API_TIMEOUT: "30"
  API_RATE_LIMIT: "100"
  
  # Feature flags
  ENABLE_ANALYTICS: "true"
  ENABLE_MONITORING: "true"
  ENABLE_LOGGING: "true"
  
  # Cache configuration
  CACHE_TTL: "3600"
  CACHE_ENABLED: "true"
